spring:
  application:
    name: order-pipeline-agent

  datasource:
    url: jdbc:postgresql://localhost:5432/agentdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=2h

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-20250514
  max-tokens: 1024

agent:
  anomaly:
    order-drop-threshold-pct: 30
    failure-rate-threshold-pct: 10
    processing-delay-ms: 5000
    stalled-order-minutes: 20
    cron: "0 */5 * * * *"
    regions:
      - SRI_LANKA
      - BANGLADESH
      - POPEYES

slack:
  webhook-url: ${SLACK_WEBHOOK_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.yourorg.agent.client: INFO
    com.yourorg.agent.agent: INFO
    org.springframework.web.reactive.function.client: DEBUG
